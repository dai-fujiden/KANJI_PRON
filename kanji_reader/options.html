<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <title>Kanji Reader Settings</title>

    <link rel="stylesheet" href="options.css">
</head>

<body>

    <body>

        <div class="card">

            <h1>漢字 Reader</h1>

            <h2>表示言語</h2>

            <label class="switch">
                <input type="checkbox" id="showJP">
                <span>日本語</span>
            </label>

            <label class="switch">
                <input type="checkbox" id="showCN">
                <span>中国語</span>
            </label>

            <label class="switch">
                <input type="checkbox" id="showKR">
                <span>韓国語</span>
            </label>

            <h2>機能</h2>

            <label class="switch">
                <input type="checkbox" id="enabled">
                <span>拡張機能ON</span>
            </label>

            <button id="save">
                保存
            </button>

        </div>

        <script src="options.js"></script>

    </body>
